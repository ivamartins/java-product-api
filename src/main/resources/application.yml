server:
  port: 8081

spring:
  application:
    name: product-api

  # Database - PostgreSQL
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/productdb}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none          # We control schema via schema.sql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Initialize schema + PL/pgSQL procedures on startup (great for study)
  sql:
    init:
      mode: always
      data-locations: classpath:db/schema.sql
      separator: ";"

  # Kafka configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: product-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Actuator (optional but useful)
management:
  endpoints:
    web:
      exposure:
        include: health,info
